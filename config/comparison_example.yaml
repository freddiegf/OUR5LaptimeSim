# ============================================================
# Car Comparison Configuration — Example
# ============================================================
# Specify a base car config and named variants with parameter
# overrides.  Any parameter in the car YAML hierarchy can be
# overridden (mass, aero.Cl, powertrain.power_limit_kW, etc.).
#
# Usage:
#   python main.py --compare config/comparison_example.yaml
# ============================================================

base: config/car_default.yaml

variants:
  - label: "320kg / 30kW / 84s5p"
    overrides:
      mass: 320
      powertrain:
        power_limit_kW: 30.0
      battery:
        n_parallel: 5

  - label: "330kg / 40kW / 84s6p"
    overrides:
      mass: 330
      powertrain:
        power_limit_kW: 40.0
      battery:
        n_parallel: 6
