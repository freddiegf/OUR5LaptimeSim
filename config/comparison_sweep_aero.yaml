# ============================================================
# Car Comparison — Grid Sweep Example
# ============================================================
# Instead of listing each variant manually, define parameters
# and their values.  The sim runs every combination (Cartesian
# product).
#
# This example sweeps 3 power limits x 3 battery sizes = 9 variants.
#
# Usage:
#   python3 main.py --compare config/comparison_sweep_example.yaml
#   python3 main.py --compare config/comparison_sweep_example.yaml --events endurance
# ============================================================

base: config/car_default.yaml


sweep:
  params:
    - path: aero.Cl
      values: [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0]

    - path: aero.Cd
      values: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2.0]

