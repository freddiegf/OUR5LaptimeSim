# ============================================================
# FS Skidpad Event Track
# ============================================================
# Figure-8 layout per FS rules:
#   Inner circles: 15.25 m diameter (r = 7.625 m)
#   Outer circles: 21.25 m diameter (r = 10.625 m)
#   Driving path: 3 m wide between inner and outer circles
#   Centreline radius: (7.625 + 10.625) / 2 = 9.125 m
#   Two laps left (CCW) then two laps right (CW).
#   Only the inner two laps (one each direction) are timed.
#
# Layout:
#   approach straight → left entry (untimed) → left timed →
#   crossing straight → right timed → right exit (untimed) →
#   exit straight
#
# Positive radius = left turn (CCW), negative = right turn (CW).
# Arc length for 360 deg circle: 2*pi*9.125 = 57.33 m

segments:
  - {type: straight, length: 15.0}                     # approach
  - {type: corner,   radius:  9.125, length: 57.33}    # left entry lap  (untimed)
  - {type: corner,   radius:  9.125, length: 57.33}    # left timed lap
  - {type: straight, length:  3.5}                     # crossing straight
  - {type: corner,   radius: -9.125, length: 57.33}    # right timed lap
  - {type: corner,   radius: -9.125, length: 57.33}    # right exit lap  (untimed)
  - {type: straight, length: 15.0}                     # exit
