# ============================================================
# FS Skidpad Event Track
# ============================================================
# Figure-8 layout per FS rules:
#   Inner radius: 7.625 m (15.25 m diameter)
#   Two laps left (CCW) then two laps right (CW).
#   Only the inner two laps (one each direction) are timed.
#
# Positive radius = left turn (CCW), negative = right turn (CW).
# Arc length for 360 deg circle: 2*pi*r = 2*pi*7.625 = 47.91 m

segments:
  - {type: corner, radius:  7.625, length: 47.91}   # left entry lap  (untimed)
  - {type: corner, radius:  7.625, length: 47.91}   # left timed lap
  - {type: corner, radius: -7.625, length: 47.91}   # right timed lap
  - {type: corner, radius: -7.625, length: 47.91}   # right exit lap  (untimed)
