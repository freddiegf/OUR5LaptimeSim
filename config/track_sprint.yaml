# ============================================================
# FS Sprint / Endurance Track
# ============================================================
# Representative Formula Student autocross layout, ~1050 m per lap.
# Inspired by FS Germany / FS UK typical layouts.
#
# Positive radius = left-hand turn (CCW)
# Negative radius = right-hand turn (CW)
# Length is arc length in metres.
#
# Segment breakdown:
#   3 hairpins (r=4.5–5 m, 180 deg)
#   2 sweepers (r=12–15 m)
#   1 right-left chicane
#   1 slalom section (5 alternating 60 deg corners)
#   1 long oval sweeper (r=12, 300 deg)
#   Connecting straights

segments:
  # --- Start/finish straight ---
  - {type: straight,  length: 80.0}

  # --- Hairpin 1 (right, tight) ---
  - {type: corner,    radius:  -5.0,  length: 15.71}   # 180 deg

  - {type: straight,  length: 30.0}

  # --- Left sweeper (120 deg) ---
  - {type: corner,    radius:  15.0,  length: 31.42}

  - {type: straight,  length: 25.0}

  # --- Right-left chicane ---
  - {type: corner,    radius:  -8.0,  length: 16.76}   # 120 deg right
  - {type: straight,  length:   5.0}
  - {type: corner,    radius:   8.0,  length: 16.76}   # 120 deg left

  - {type: straight,  length: 40.0}

  # --- Hairpin 2 (right, very tight) ---
  - {type: corner,    radius:  -4.5,  length: 14.14}   # 180 deg

  - {type: straight,  length: 35.0}

  # --- Slalom: 5 alternating 60 deg corners ---
  - {type: corner,    radius:   9.0,  length:  9.42}   # left
  - {type: corner,    radius:  -9.0,  length:  9.42}   # right
  - {type: corner,    radius:   9.0,  length:  9.42}   # left
  - {type: corner,    radius:  -9.0,  length:  9.42}   # right
  - {type: corner,    radius:   9.0,  length:  9.42}   # left

  - {type: straight,  length: 50.0}

  # --- Long oval sweeper (300 deg right) ---
  - {type: corner,    radius: -12.0,  length: 62.83}

  - {type: straight,  length: 20.0}

  # --- Hairpin 3 (left) ---
  - {type: corner,    radius:   5.0,  length: 15.71}   # 180 deg

  - {type: straight,  length: 35.0}

  # --- Right-left chicane 2 ---
  - {type: corner,    radius:  -7.0,  length: 11.00}   # 90 deg right
  - {type: corner,    radius:   7.0,  length: 11.00}   # 90 deg left

  # --- Final straight back to S/F ---
  - {type: straight,  length: 60.0}

  # --- Closing hairpin (right) ---
  - {type: corner,    radius:  -5.0,  length: 15.71}   # 180 deg

  - {type: straight,  length: 40.0}
